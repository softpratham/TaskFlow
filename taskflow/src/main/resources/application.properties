spring.application.name=TaskFlow
# Use the port assigned by the server (useful for Render/Heroku), or default to 8080
server.port=${PORT:8080}

# DATABASE
# Removed the hardcoded password and simplified the URL
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/taskflow_db}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
# Removed the hardcoded secret. The app will look for an environment variable named JWT_SECRET.
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# MAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=pm.10deokar2002@gmail.com
spring.mail.password=${MAIL_PASSWORD}
app.email.from=pm.10deokar2002@gmail.com
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true